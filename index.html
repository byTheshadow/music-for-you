<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music For You</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-theme="vinyl">

    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>

    <!-- 主容器 -->
    <div class="app-container">

        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="logo">
                <i class="fas fa-record-vinyl logo-icon"></i>
                <span class="logo-text">Music For You</span>
            </div>
            <div class="top-actions">
                <button class="btn-icon" id="themeToggleBtn" title="切换主题">
                    <i class="fas fa-palette"></i>
                </button>
                <button class="btn-icon" id="settingsBtn" title="设置">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="搜索你想听的歌..." autocomplete="off">
                <button class="search-btn" id="searchBtn">搜索</button>
            </div>
            <div class="search-filters">
                <label class="filter-tag">
                    <input type="checkbox" id="srcNetease" checked>
                    <span class="tag netease">网易云</span>
                </label>
                <label class="filter-tag">
                    <input type="checkbox" id="srcItunes" checked>
                    <span class="tag itunes">iTunes</span>
                </label></div>
        </div>

        <!-- 主内容区-->
        <div class="main-content">

            <!-- 左侧：搜索结果 / 播放列表 -->
            <div class="content-left">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="search">
                        <i class="fas fa-search"></i> 搜索结果
                    </button>
                    <button class="tab-btn" data-tab="playlist">
                        <i class="fas fa-heart"></i> 我的收藏
                    </button><button class="tab-btn" data-tab="history">
                        <i class="fas fa-clock"></i> 最近播放
                    </button>
                </div>

                <div class="song-list-container">
                    <!-- 搜索结果 -->
                    <div class="song-list" id="searchResults"><div class="empty-state">
                            <i class="fas fa-music"></i>
                            <p>搜索你喜欢的音乐吧 ❤️</p>
                        </div>
                    </div><!-- 收藏列表 -->
                    <div class="song-list hidden" id="playlistResults">
                        <div class="empty-state">
                            <i class="fas fa-heart"></i>
                            <p>还没有收藏的歌曲</p>
                        </div>
                    </div>
                    <!-- 历史记录 -->
                    <div class="song-list hidden" id="historyResults">
                        <div class="empty-state">
                            <i class="fas fa-clock"></i>
                            <p>还没有播放记录</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：播放器 -->
            <div class="content-right">
                <div class="player-card">
                    <!--唱片/封面 -->
                    <div class="album-art-wrapper">
                        <div class="vinyl-disc" id="vinylDisc">
                            <div class="vinyl-grooves"></div>
                            <div class="vinyl-label">
                                <img src="" alt="" id="albumArt" class="album-img">
                                <div class="default-art" id="defaultArt">
                                    <i class="fas fa-music"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 歌曲信息 -->
                    <div class="song-info">
                        <h2 class="song-title" id="songTitle">等待播放...</h2>
                        <p class="song-artist" id="songArtist">选一首歌开始吧</p>
                        <span class="song-source" id="songSource"></span>
                    </div>

                    <!-- 进度条 -->
                    <div class="progress-section">
                        <span class="time" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-thumb" id="progressThumb"></div>
                        </div>
                        <span class="time" id="totalTime">0:00</span>
                    </div>

                    <!-- 控制按钮 -->
                    <div class="controls">
                        <button class="ctrl-btn" id="shuffleBtn" title="随机播放">
                            <i class="fas fa-random"></i>
                        </button>
                        <button class="ctrl-btn" id="prevBtn" title="上一首">
                            <i class="fas fa-step-backward"></i>
                        </button>
                        <button class="ctrl-btn play-btn" id="playBtn" title="播放">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        <button class="ctrl-btn" id="nextBtn" title="下一首">
                            <i class="fas fa-step-forward"></i>
                        </button>
                        <button class="ctrl-btn" id="repeatBtn" title="循环模式">
                            <i class="fas fa-redo"></i>
                        </button>
                    </div>

                    <!-- 音量 -->
                    <div class="volume-section">
                        <button class="btn-icon" id="volumeBtn">
                            <i class="fas fa-volume-up" id="volumeIcon"></i>
                        </button>
                        <div class="volume-bar" id="volumeBar">
                            <div class="volume-fill" id="volumeFill"></div>
                        </div>
                    </div>

                    <!-- 收藏按钮 -->
                    <button class="favorite-btn" id="favoriteBtn" title="收藏">
                        <i class="far fa-heart" id="favoriteIcon"></i>
                    </button>
                </div>

                <!-- 歌词区域 -->
                <div class="lyrics-card">
                    <h3><i class="fas fa-align-left"></i> 歌词</h3>
                    <div class="lyrics-content" id="lyricsContent">
                        <p class="lyrics-placeholder">暂无歌词</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主题设置面板 -->
    <div class="theme-panel hidden" id="themePanel">
        <div class="theme-panel-content">
            <div class="theme-panel-header">
                <h3>🎨 主题设置</h3>
                <button class="btn-icon" id="closeThemePanel">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="theme-presets">
                <h4>预设主题</h4>
                <div class="preset-list">
                    <button class="preset-btn active" data-theme="vinyl">
                        <div class="preset-preview vinyl-preview"></div>
                        <span>黑胶唱片</span>
                    </button>
                    <button class="preset-btn" data-theme="tape">
                        <div class="preset-preview tape-preview"></div>
                        <span>复古磁带</span>
                    </button>
                    <button class="preset-btn" data-theme="neon">
                        <div class="preset-preview neon-preview"></div>
                        <span>霓虹灯</span>
                    </button>
                    <button class="preset-btn" data-theme="sakura">
                        <div class="preset-preview sakura-preview"></div>
                        <span>樱花粉</span>
                    </button>
                    <button class="preset-btn" data-theme="ocean">
                        <div class="preset-preview ocean-preview"></div>
                        <span>深海蓝</span>
                    </button>
                    <button class="preset-btn" data-theme="forest">
                        <div class="preset-preview forest-preview"></div>
                        <span>森林绿</span>
                    </button>
                </div>
            </div>

            <div class="theme-custom">
                <h4>自定义颜色</h4>
                <div class="color-pickers">
                    <div class="color-item">
                        <label>背景色</label>
                        <input type="color" id="customBg" value="#1a1a2e">
                    </div>
                    <div class="color-item">
                        <label>主色调</label>
                        <input type="color" id="customPrimary" value="#e94560">
                    </div>
                    <div class="color-item">
                        <label>文字色</label>
                        <input type="color" id="customText" value="#ffffff">
                    </div>
                    <div class="color-item">
                        <label>卡片色</label>
                        <input type="color" id="customCard" value="#16213e">
                    </div>
                </div>
                <button class="apply-btn" id="applyCustomTheme">应用自定义主题</button>
            </div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-record-vinyl fa-spin"></i>
            <p>搜索中...</p>
        </div>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer" preload="auto"></audio>

    <!-- JS文件 -->
    <script src="js/storage.js"></script>
    <script src="js/api/itunes.js"></script>
    <script src="js/api/netease.js"></script>
    <script src="js/search.js"></script>
    <script src="js/player.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
